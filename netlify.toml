[build]
  publish = "dist"
  command = "pnpm build"

# Forzamos a Netlify a compilar las funciones de Node usando esbuild (adiós errores de Octokit)
[functions]
  node_bundle = "esbuild"

# Mantienes la Edge Function únicamente para el callback de autenticación si es necesario
[[edge_functions]]
  path = "/api/auth/callback"
  function = "auth"