<!DOCTYPE html><html> <head><meta charset="UTF-8"><title>Redirigiendo…</title><script>(function(){const available = ["es","it"];
const defaultLang = "es";

    // Detección de idioma en el cliente

    window.location.replace(`/${lang}/`);
  })();</script><noscript><meta http-equiv="refresh" content="0; url=/es/"></noscript><link rel="stylesheet" href="/_astro/index.0AA-es87.css"></head> <body></body></html>
